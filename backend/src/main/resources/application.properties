spring.application.name=backend
#server.port=8000

# H2 in-memory database (for demo/hackathon - switch to PostgreSQL for production)
spring.datasource.url=jdbc:h2:mem:transitops
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# PostgreSQL configuration (uncomment and set DB_PASSWORD env var to use)
# spring.datasource.url=jdbc:postgresql://localhost:5432/transitops
# spring.datasource.username=postgres
# spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.open-in-view=false

# Enable H2 console (optional, for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

jwt.secret=MyVerySecretKeyForOdooBackendApplication2026MyVerySecretKey
jwt.expiration=86400000
