<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TransitOps — Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <span>🚛</span>
        <span>TransitOps</span>
      </div>
      <p class="login-subtitle">Create your account</p>

      <form id="registerForm">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" name="fullName" class="form-control" placeholder="John Doe" required autofocus>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="you@transitops.com" required>
        </div>

        <div class="form-group">
          <label for="phoneNumber">Phone Number</label>
          <input type="tel" id="phoneNumber" name="phoneNumber" class="form-control" placeholder="9876543210" required>
        </div>

        <div class="form-group">
          <label for="roleId">Role</label>
          <select id="roleId" name="roleId" class="form-control" required>
            <option value="">Select a role</option>
          </select>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required minlength="6">
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" placeholder="••••••••" required>
        </div>

        <div id="registerError" class="hidden" style="color: var(--danger); font-size: 0.875rem; margin-bottom: 1rem;"></div>
        <div id="registerSuccess" class="hidden" style="color: var(--success); font-size: 0.875rem; margin-bottom: 1rem;"></div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
      </form>

      <div class="mt-2 text-center text-sm text-secondary">
        Already have an account? <a href="index.html" style="color: var(--primary); font-weight: 500;">Sign in</a>
      </div>

      <div class="mt-2 text-center">
        <button class="btn btn-ghost" data-theme-toggle>🌙</button>
      </div>
    </div>
  </div>

  <script src="js/utils.js?v=2"></script>
  <script src="js/api.js?v=2"></script>
  <script src="js/register.js?v=2"></script>
</body>
</html>
