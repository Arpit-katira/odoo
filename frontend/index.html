<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TransitOps — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <span>🚛</span>
        <span>TransitOps</span>
      </div>
      <p class="login-subtitle">Smart Transport Operations Platform</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="you@transitops.com" required autofocus>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <div id="loginError" class="hidden" style="color: var(--danger); font-size: 0.875rem; margin-bottom: 1rem;"></div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
      </form>

      <div class="mt-3" style="background: var(--surface-2); padding: 1rem; border-radius: var(--radius-sm); font-size: 0.85rem; color: var(--text-secondary);">
        <strong>Demo Accounts</strong>
        <div class="mt-1">admin@transitops.com / admin123</div>
        <div>dispatcher@transitops.com / dispatcher123</div>
        <div>safety@transitops.com / safety123</div>
        <div>finance@transitops.com / finance123</div>
      </div>

      <div class="mt-2 text-center text-sm text-secondary">
        Don't have an account? <a href="register.html" style="color: var(--primary); font-weight: 500;">Register</a>
      </div>

      <div class="mt-2 text-center">
        <button class="btn btn-ghost" data-theme-toggle>🌙</button>
      </div>
    </div>
  </div>

  <script src="js/utils.js?v=2"></script>
  <script src="js/api.js?v=2"></script>
  <script src="js/auth.js?v=2"></script>
</body>
</html>
