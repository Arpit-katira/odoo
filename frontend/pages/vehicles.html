<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicles — TransitOps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css?v=2">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span>🚛</span>
        <span>TransitOps</span>
      </div>
      <nav class="sidebar-nav">
        <a href="../dashboard.html" class="nav-item" data-module="dashboard"><span class="icon">📊</span> Dashboard</a>
        <a href="vehicles.html" class="nav-item" data-module="vehicles"><span class="icon">🚐</span> Vehicles</a>
        <a href="drivers.html" class="nav-item" data-module="drivers"><span class="icon">👤</span> Drivers</a>
        <a href="trips.html" class="nav-item" data-module="trips"><span class="icon">🛣️</span> Trips</a>
        <a href="maintenance.html" class="nav-item" data-module="maintenance"><span class="icon">🔧</span> Maintenance</a>
        <a href="expenses.html" class="nav-item" data-module="fuel"><span class="icon">💰</span> Fuel & Expenses</a>
        <a href="reports.html" class="nav-item" data-module="reports"><span class="icon">📈</span> Reports</a>
        <a href="users.html" class="nav-item" data-module="users"><span class="icon">🛡️</span> Users</a>
      </nav>
      <div class="sidebar-footer">
        <div>Fleet operations made simple.</div>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle">☰</button>
          <h2 class="page-title">Vehicle Registry</h2>
        </div>
        <div class="topbar-actions">
          <button class="btn btn-ghost" data-theme-toggle>🌙</button>
          <div class="user-pill">
            <div class="user-avatar"></div>
            <div>
              <div class="user-name font-semibold"></div>
              <div class="user-role text-xs text-muted"></div>
            </div>
          </div>
          <button class="btn btn-secondary btn-sm" data-logout>Logout</button>
        </div>
      </header>

      <section class="page-body" data-require-view="vehicles">
        <div class="page-header">
          <div>
            <h1>Vehicles</h1>
            <p class="text-secondary text-sm">Manage your fleet assets</p>
          </div>
          <button class="btn btn-primary" id="btnAddVehicle" data-require-edit="vehicles">+ Add Vehicle</button>
        </div>

        <div class="toolbar">
          <div class="search-box">
            <span class="icon">🔍</span>
            <input type="text" id="searchVehicles" class="form-control" placeholder="Search by name, reg no, type...">
          </div>
          <select id="filterStatus" class="form-control">
            <option value="">All Statuses</option>
            <option value="Available">Available</option>
            <option value="On Trip">On Trip</option>
            <option value="In Shop">In Shop</option>
            <option value="Retired">Retired</option>
          </select>
          <select id="filterType" class="form-control">
            <option value="">All Types</option>
            <option value="Truck">Truck</option>
            <option value="Mini Truck">Mini Truck</option>
            <option value="Pickup">Pickup</option>
            <option value="Trailer">Trailer</option>
          </select>
        </div>

        <div class="card">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Reg. No.</th>
                  <th>Name / Model</th>
                  <th>Type</th>
                  <th>Capacity (kg)</th>
                  <th>Odometer</th>
                  <th>Acquisition Cost</th>
                  <th>Region</th>
                  <th>Status</th>
                  <th style="text-align: right;" data-require-edit="vehicles">Actions</th>
                </tr>
              </thead>
              <tbody id="vehiclesTableBody">
                <!-- rows rendered by JS -->
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Vehicle Modal -->
  <div class="modal-overlay" id="vehicleModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Add Vehicle</div>
        <button class="modal-close" data-close-modal>✕</button>
      </div>
      <form id="vehicleForm">
        <div class="modal-body">
          <input type="hidden" name="id" id="vehicleId">
          <div class="form-row">
            <div class="form-group">
              <label>Registration Number *</label>
              <input type="text" name="regNo" class="form-control" required placeholder="MH12AB1234">
            </div>
            <div class="form-group">
              <label>Vehicle Name / Model *</label>
              <input type="text" name="name" class="form-control" required placeholder="Tata Ace">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Type *</label>
              <select name="type" class="form-control" required>
                <option value="">Select type</option>
                <option value="Truck">Truck</option>
                <option value="Mini Truck">Mini Truck</option>
                <option value="Pickup">Pickup</option>
                <option value="Trailer">Trailer</option>
                <option value="Van">Van</option>
              </select>
            </div>
            <div class="form-group">
              <label>Max Load Capacity (kg) *</label>
              <input type="number" name="capacity" class="form-control" required min="1" placeholder="750">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Odometer (km) *</label>
              <input type="number" name="odometer" class="form-control" required min="0" placeholder="0">
            </div>
            <div class="form-group">
              <label>Acquisition Cost (₹) *</label>
              <input type="number" name="acquisitionCost" class="form-control" required min="0" placeholder="650000">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Region</label>
              <input type="text" name="region" class="form-control" placeholder="Pune">
            </div>
            <div class="form-group">
              <label>Status</label>
              <select name="status" class="form-control">
                <option value="Available">Available</option>
                <option value="On Trip">On Trip</option>
                <option value="In Shop">In Shop</option>
                <option value="Retired">Retired</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-close-modal>Cancel</button>
          <button type="submit" class="btn btn-primary">Save Vehicle</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/utils.js?v=2"></script>
  <script src="../js/api.js?v=2"></script>
  <script src="../js/vehicles.js?v=2"></script>
</body>
</html>
