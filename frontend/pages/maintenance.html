<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance — TransitOps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css?v=3">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span>🚛</span>
        <span>TransitOps</span>
      </div>
      <nav class="sidebar-nav">
        <a href="../dashboard.html" class="nav-item" data-module="dashboard"><span class="icon">📊</span> Dashboard</a>
        <a href="vehicles.html" class="nav-item" data-module="vehicles"><span class="icon">🚐</span> Vehicles</a>
        <a href="drivers.html" class="nav-item" data-module="drivers"><span class="icon">👤</span> Drivers</a>
        <a href="trips.html" class="nav-item" data-module="trips"><span class="icon">🛣️</span> Trips</a>
        <a href="maintenance.html" class="nav-item" data-module="maintenance"><span class="icon">🔧</span> Maintenance</a>
        <a href="expenses.html" class="nav-item" data-module="fuel"><span class="icon">💰</span> Fuel & Expenses</a>
        <a href="reports.html" class="nav-item" data-module="reports"><span class="icon">📈</span> Reports</a>
        <a href="users.html" class="nav-item" data-module="users"><span class="icon">🛡️</span> Users</a>
      </nav>
      <div class="sidebar-footer">
        <div>Fleet operations made simple.</div>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle">☰</button>
          <h2 class="page-title">Maintenance</h2>
        </div>
        <div class="topbar-actions">
          <button class="btn btn-ghost" data-theme-toggle>🌙</button>
          <div class="user-pill">
            <div class="user-avatar"></div>
            <div>
              <div class="user-name font-semibold"></div>
              <div class="user-role text-xs text-muted"></div>
            </div>
          </div>
          <button class="btn btn-secondary btn-sm" data-logout>Logout</button>
        </div>
      </header>

      <section class="page-body" data-require-view="maintenance">
        <div class="page-header">
          <div>
            <h1>Maintenance Logs</h1>
            <p class="text-secondary text-sm">Track vehicle servicing and repairs</p>
          </div>
          <button class="btn btn-primary" id="btnAddMaintenance" data-require-edit="maintenance">+ Log Maintenance</button>
        </div>

        <div class="toolbar">
          <div class="search-box">
            <span class="icon">🔍</span>
            <input type="text" id="searchMaintenance" class="form-control" placeholder="Search by vehicle or type...">
          </div>
          <select id="filterStatus" class="form-control">
            <option value="">All Statuses</option>
            <option value="Open">Open</option>
            <option value="Closed">Closed</option>
          </select>
        </div>

        <div class="card">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Vehicle</th>
                  <th>Maintenance Type</th>
                  <th>Description</th>
                  <th>Start Date</th>
                  <th>End Date</th>
                  <th>Cost</th>
                  <th>Status</th>
                  <th style="text-align: right;" data-require-edit="maintenance">Actions</th>
                </tr>
              </thead>
              <tbody id="maintenanceTableBody">
                <!-- rows rendered by JS -->
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Maintenance Modal -->
  <div class="modal-overlay" id="maintenanceModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Log Maintenance</div>
        <button class="modal-close" data-close-modal>✕</button>
      </div>
      <form id="maintenanceForm">
        <div class="modal-body">
          <div class="form-row">
            <div class="form-group">
              <label>Vehicle *</label>
              <select name="vehicleId" id="maintVehicleId" class="form-control" required>
                <option value="">Select vehicle</option>
              </select>
            </div>
            <div class="form-group">
              <label>Maintenance Type *</label>
              <input type="text" name="type" class="form-control" required placeholder="Oil Change">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Start Date *</label>
              <input type="date" name="startDate" class="form-control" required>
            </div>
            <div class="form-group">
              <label>Cost (₹)</label>
              <input type="number" name="cost" class="form-control" min="0" placeholder="4500">
            </div>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea name="description" class="form-control" rows="3" placeholder="Details about the maintenance work..."></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-close-modal>Cancel</button>
          <button type="submit" class="btn btn-primary">Log Maintenance</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/utils.js?v=3"></script>
  <script src="../js/api-backend.js?v=3"></script>
  <script src="../js/maintenance.js?v=3"></script>
</body>
</html>
